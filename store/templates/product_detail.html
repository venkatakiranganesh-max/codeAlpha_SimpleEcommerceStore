<!DOCTYPE html>
<html>
<head>

<title>Product Details</title>

<style>

body{
    font-family:Arial, sans-serif;
    margin:0;

    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2
    );

    min-height:100vh;
}


.box{

    background:linear-gradient(
        145deg,
        #dbeafe,
        #ffffff
    );

    width:450px;
    margin:50px auto;
    padding:30px;

    text-align:center;

    border-radius:25px;

    box-shadow:
    0 15px 30px rgba(0,0,0,0.4);
}


img{

    width:300px;
    height:250px;

    object-fit:contain;

    background:white;

    padding:10px;

    border-radius:20px;
}


h1{
    font-size:35px;
}


h2{
    color:green;
    font-size:28px;
}


p{
    color:#555;
    line-height:1.5;
}


button{

    background:#ff5722;

    color:white;

    padding:12px 25px;

    border:none;

    border-radius:25px;

    font-weight:bold;

    cursor:pointer;
}


button:hover{

    background:#e64a19;

}


</style>


</head>


<body>


<div class="box">


{% if product.image %}

<img src="{{ product.image.url }}">

{% endif %}


<h1>{{ product.name }}</h1>


<h2>₹{{ product.price }}</h2>


<p>{{ product.description }}</p>


<a href="{% url 'add_to_cart' product.id %}">

<button>
Add to Cart 🛒
</button>

</a>


</div>


</body>
</html>
