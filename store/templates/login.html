<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f2f2f2;
            margin-top:100px;
        }

        .box{
            background:white;
            width:350px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            background:green;
            color:white;
            padding:10px;
            border:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="box">

<h1>Login</h1>

<form method="POST">

    {% csrf_token %}

    <input type="text"
           name="username"
           placeholder="Enter Username"
           required>

    <br>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required>

    <br>

    <button type="submit">
        Login
    </button>

</form>

</div>

</body>
</html>
